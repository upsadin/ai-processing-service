spring:
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximumPoolSize: 5

  kafka:
    bootstrap-servers: ${KAFKACLUSTER_BROKERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKACLUSTER_USERNAME}"
        password="${KAFKACLUSTER_PASSWORD}";
    producer:
      transaction-id-prefix: ai-processing-tx-${HOSTNAME}-
    consumer:
      concurrency: 1

  jpa:
    open-in-view: false
